services:
  
  # Servicio de llama.cpp
  # ****************************************************************
  llamacpp:
    build:
      context: ./engines/llama.cpp
      dockerfile: Dockerfile
      args:
        # Aquí mapeamos la variable del .env al argumento del Dockerfile
        - AMDGPU_TARGETS=${AMDGPU_TARGETS}
    privileged: true
    container_name: llama.cpp
    profiles: ['llama.cpp']
    restart: unless-stopped
    environment:
      - LLAMA_ARG_PORT=${LLAMACPP_GUEST_PORT}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION}
      - GABGPT_GUEST_MODELS_FOLDER=${GABGPT_GUEST_MODELS_FOLDER}
    env_file:
      - ${GABGPT_SECRET_FOLDER}/.env.llama
    devices:
      - "/dev/kfd:/dev/kfd"    # Interfaz de computación AMD
      - "/dev/dri:/dev/dri"    # Renderizado directo
        #group_add:
        #- video                  # Permisos para acceder al hardware de video
        #- render
    ipc : host      # Optimizacion: Comparte el espacio de memoria interproceso con el host. El contenedor puede acceder a recursos del host como semaforos, memoria compartida...
    shm_size: '16gb'    # Optimizacion: Define el tamaño de la memoria compartida. Los procesos comparten memoria directamente en la memoria, sin tener que copiarlos.
    security_opt:
      - seccomp:unconfined     # A veces necesario para ROCm
    cap_add:
      - SYS_PTRACE
    expose:
      - ${LLAMACPP_GUEST_PORT}  # Con Expose evitamos que haya un puerto hacia afuera del contenedor asi que solo se puden ver entre los del contenedor.
    volumes:
      - ${GABGPT_HOST_MODELS_FOLDER}:${GABGPT_GUEST_MODELS_FOLDER}  # Monta los modelos locales
      - ./llama.cpp/scripts:/app/scripts/
    entrypoint: ["/bin/bash", "-c"]
    command: "'source /app/scripts/import_env.sh && source /app/scripts/load_model.sh'"
    networks:
      - app_network


  # Servicio de FastFlowLLM - Engine de LLM
  # ****************************************************************
  fastflowlm:
    build:
      context: ./engines/FastFlowLM
      dockerfile: Dockerfile
      args: 
        - BASE_IMAGE=ubuntu:24.04
    container_name: fastflowlm
    profiles: ['fastflowlm']
    entrypoint: ["/bin/bash", "-c"]
    networks:
      - app_network


  # Servicio de Lemonade-server.ai - Engine de LLM con soporte de AMD
  # ****************************************************************
  lemonade:
      build:
        context: ./engines/lemonade-server
        dockerfile: Dockerfile
      #image: ghcr.io/lemonade-sdk/lemonade-server:latest
      container_name: lemonade-server
      profiles: ['lemonade-server']
      restart: unless-stopped
      environment:
        #- LEMONADE_HOST=127.0.0.1
        #- LEMONADE_PORT=13305
        #- LEMONADE_API_KEY=your-api-key-here
        - LEMONADE_LLAMACPP=rocm
        - XDG_RUNTIME_DIR=/tmp/
        - XDG_CACHE_HOME=/app/lemonade/persistencia/.cache
        - XDG_DATA_HOME=/app/lemonade/persistencia/.data
        - LEMONADE_CACHE_DIR=/app/lemonade/persistencia/.cache/lemonade
        - HSA_OVERRIDE_GFX_VERSION=12.0.0
        - HIP_VISIBLE_DEVICES=0
      devices:
        - "/dev/kfd:/dev/kfd"
        - "/dev/dri:/dev/dri"
        - "/dev/accel/accel0:/dev/accel/accel0"
      privileged: true
      security_opt:
        - apparmor:unconfined
          #@        - seccomp:unconfined     # A veces necesario para ROCm
      ports:
        - 13305:13305
      volumes:
        - /mnt/datos/lemonade/persistencia:/app/lemonade/persistencia
          # - /mnt/datos/lemonade/xdg:/app/lemonade/xdg
          #- /mnt/datos/lemonade/xdg:/app/lemonade/
          #- /mnt/datos/lemonade/llama:/app/lemonade/llama
          #- /mnt/datos/lemonade/models:/root/.cache/lm-studio/models
          #- /mnt/datos/lemonade/recipes:/app/lemonade/.cache/recipes
      #entrypoint: ["/bin/bash", "-c"]
      networks:
        - app_network




  # Servicio de Nginx (proxy inverso con autenticación por API-KEY)
  # ****************************************************************
  nginx:
    image: nginx:alpine
      #    build:
      #context: ./nginx
    container_name: nginx-landing
    restart: unless-stopped
    profiles: ['nginx']
    ports:
      - "${NGINX_HOST_HTTP_PORT}:${NGINX_GUEST_HTTP_PORT}"
    depends_on:
      - openwebui
      - llamacpp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd  # Opcional: para autenticación básica
    #environment:
    #  - API_KEY=tu_api_key_secreta  # Cambia esto por tu API-KEY
    networks:
      - app_network


  # Servicio de OpenWebUI
  # ****************************************************************
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_HOST_PORT}:${OPENWEBUI_GUEST_PORT}"  # Puerto interno de Open WebUI
        #    expose:
        #- ${OPENWEBUI_CONTAINER_PORT}
        #    depends_on: 
        #- llamacpp
    env_file:
      - ${GABGPT_SECRET_FOLDER}/.env.openwebui
    volumes:
      - ${OPENWEBUI_DATA_PATH}:/app/backend/data  # Persistencia de datos
    environment:
      #- OLLAMA_BASE_URL=${LLM_SERVER_URL}  # Apunta a Nginx como proxy
      - OPENAI_API_BASE_URL=${LLAMACPP_SERVER_URL}  # Apunta a Nginx como proxy
        #- OPENAI_API_KEY=api_key_openai
        #- WEBUI_SECRET_KEY=misupersecretokey
    networks:
      - app_network

  # Servicio de OpenNotebook (NotebookLM open source)
  # ****************************************************************
  #opennotebook:
  


  # Servicio de n8n
  # ****************************************************************
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    profiles: ['n8n']
    environment:
      - N8N_HOST=n8n
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_PORT=${N8N_PORT}
      - NODE_ENV=production
      - WEBHOOK_URL=https://wopr.lan/n8n/
      - N8N_PATH=/n8n/
      - N8N_EDITOR_BASE_URL=https://wopr.lan/n8n/
    expose:
      - ${N8N_PORT}
    volumes:
      - ${N8N_GUEST_DATA_PATH}:/home/node/.n8n  # Persiste los datos de n8n (flujos)
    networks:
      - app_network
  
  # Servicio de Nginx (proxy inverso con autenticación por API-KEY)
  # ****************************************************************
  caddy:
    image: caddy:latest
    container_name: caddy-landing
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - /mnt/datos/caddyfile/:/data
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
